<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Museo Virtual Louvre</title>

<style>
body { margin:0; overflow:hidden; font-family: Arial; }

#info {
position: absolute;
bottom: 20px;
left: 20px;
background: rgba(0,0,0,0.8);
color: white;
padding: 12px;
max-width: 300px;
border-radius: 8px;
display:none;
}
</style>
</head>

<body>

<div id="info"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

// Cámara
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,1.6,8);

// Render
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Luz (clave para evitar negro)
const light = new THREE.AmbientLight(0xffffff, 1);
scene.add(light);

// Piso
const floor = new THREE.Mesh(
new THREE.PlaneGeometry(50,50),
new THREE.MeshBasicMaterial({color:0xdddddd})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// Pared
const wall = new THREE.Mesh(
new THREE.PlaneGeometry(50,10),
new THREE.MeshBasicMaterial({color:0xffffff})
);
wall.position.z = -10;
wall.position.y = 5;
scene.add(wall);

// TEXTURAS SEGURAS (SIEMPRE CARGAN)
const loader = new THREE.TextureLoader();

const data = [
{
img:"https://picsum.photos/400/300?random=1",
title:"Mona Lisa",
text:"Obra de Leonardo da Vinci famosa por su expresión enigmática."
},
{
img:"https://picsum.photos/400/300?random=2",
title:"La Libertad guiando al pueblo",
text:"Representa la lucha por la libertad en Francia."
},
{
img:"https://picsum.photos/400/300?random=3",
title:"La balsa de la Medusa",
text:"Escena dramática de supervivencia."
},
{
img:"https://picsum.photos/400/300?random=4",
title:"La coronación de Napoleón",
text:"Escena del poder imperial."
},
{
img:"https://picsum.photos/400/300?random=5",
title:"El Juramento de los Horacios",
text:"Simboliza el deber."
},
{
img:"https://picsum.photos/400/300?random=6",
title:"Venus de Milo",
text:"Escultura clásica."
},
{
img:"https://picsum.photos/400/300?random=7",
title:"Victoria de Samotracia",
text:"Escultura dinámica."
},
{
img:"https://picsum.photos/400/300?random=8",
title:"Código de Hammurabi",
text:"Antiguas leyes."
},
{
img:"https://picsum.photos/400/300?random=9",
title:"El escriba sentado",
text:"Arte egipcio."
},
{
img:"https://picsum.photos/400/300?random=10",
title:"Psique y Cupido",
text:"Escultura romántica."
}
];

const paintings = [];
const info = document.getElementById("info");

data.forEach((p,i)=>{

const texture = loader.load(p.img);

const mesh = new THREE.Mesh(
new THREE.PlaneGeometry(2.5,1.8),
new THREE.MeshBasicMaterial({map:texture})
);

mesh.position.set(i*3 - 13,3,-9.9);
scene.add(mesh);

paintings.push({mesh,data:p});
});

// Movimiento
document.addEventListener("keydown",(e)=>{
if(e.key==="w") camera.position.z -= 0.3;
if(e.key==="s") camera.position.z += 0.3;
if(e.key==="a") camera.position.x -= 0.3;
if(e.key==="d") camera.position.x += 0.3;
});

// Mouse
document.addEventListener("mousemove",(e)=>{
camera.rotation.y = -(e.clientX/window.innerWidth - 0.5);
camera.rotation.x = -(e.clientY/window.innerHeight - 0.5)/3;
});

// Info
function check(){
let show=false;

paintings.forEach(p=>{
if(camera.position.distanceTo(p.mesh.position)<3){
info.style.display="block";
info.innerHTML="<b>"+p.data.title+"</b><br>"+p.data.text;
show=true;
}
});

if(!show) info.style.display="none";
}

// Animación
function animate(){
requestAnimationFrame(animate);
check();
renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>

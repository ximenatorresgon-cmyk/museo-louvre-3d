<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Museo Virtual Louvre</title>
<style>
body { margin: 0; overflow: hidden; font-family: Arial; }
#info {
position: absolute;
bottom: 20px;
left: 20px;
background: rgba(0,0,0,0.7);
color: white;
padding: 10px;
max-width: 300px;
display: none;
}
</style>
</head>
<body>

<div id="info"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

// Cámara
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,1.6,5);

// Render
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Luz
const light = new THREE.PointLight(0xffffff, 1);
light.position.set(10,10,10);
scene.add(light);

// Piso
const floorGeo = new THREE.PlaneGeometry(50,50);
const floorMat = new THREE.MeshPhongMaterial({color: 0xdddddd});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// Datos de obras
const paintingsData = [
{ title:"Mona Lisa", text:"Retrato de Leonardo da Vinci famoso por su expresión enigmática."},
{ title:"La Libertad guiando al pueblo", text:"Representa la lucha del pueblo por la libertad."},
{ title:"La coronación de Napoleón", text:"Escena del poder político de Napoleón."},
{ title:"La balsa de la Medusa", text:"Drama humano tras un naufragio."},
{ title:"El escriba sentado", text:"Escultura egipcia realista."},
{ title:"Venus de Milo", text:"Escultura clásica símbolo de belleza."},
{ title:"Código de Hammurabi", text:"Uno de los primeros códigos legales."},
{ title:"La Victoria de Samotracia", text:"Escultura dinámica de la diosa Nike."},
{ title:"Psique reanimada por el beso del amor", text:"Escultura romántica de Canova."},
{ title:"El Juramento de los Horacios", text:"Representa el deber y sacrificio."}
];

const paintings = [];
const infoBox = document.getElementById("info");

// Crear cuadros
paintingsData.forEach((p, i)=>{
const geo = new THREE.PlaneGeometry(2,1.5);
const mat = new THREE.MeshBasicMaterial({color: 0x999999});
const mesh = new THREE.Mesh(geo, mat);

mesh.position.set(i*3 - 15, 2, -5);
scene.add(mesh);

paintings.push({mesh, data:p});
});

// Movimiento
document.addEventListener("keydown", (e)=>{
if(e.key==="w") camera.position.z -= 0.3;
if(e.key==="s") camera.position.z += 0.3;
if(e.key==="a") camera.position.x -= 0.3;
if(e.key==="d") camera.position.x += 0.3;
});

// Mouse mirar
document.addEventListener("mousemove",(e)=>{
camera.rotation.y = -(e.clientX/window.innerWidth - 0.5);
camera.rotation.x = -(e.clientY/window.innerHeight - 0.5)/2;
});

// Detectar cercanía
function checkDistance(){
let show = false;

paintings.forEach(p=>{
const dist = camera.position.distanceTo(p.mesh.position);

if(dist < 3){
infoBox.style.display = "block";
infoBox.innerHTML = "<b>"+p.data.title+"</b><br>"+p.data.text;
show = true;
}
});

if(!show){
infoBox.style.display = "none";
}
}

// Animación
function animate(){
requestAnimationFrame(animate);
checkDistance();
renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Museo Virtual Louvre</title>

<style>
body { margin:0; overflow:hidden; }

#info {
position:absolute;
bottom:20px;
left:20px;
background:black;
color:white;
padding:10px;
display:none;
}
</style>

</head>
<body>

<div id="info"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1,1000);
camera.position.z = 8;

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Luz simple (para que NO se vea negro)
const light = new THREE.AmbientLight(0xffffff,1);
scene.add(light);

// Cargador
const loader = new THREE.TextureLoader();

const data = [
{img:"mona.jpg", title:"Mona Lisa", text:"Obra de Leonardo da Vinci."},
{img:"libertad.jpg", title:"La Libertad", text:"Representa revolución."},
{img:"medusa.jpg", title:"La Medusa", text:"Drama humano."},
{img:"napoleon.jpg", title:"Napoleón", text:"Poder imperial."},
{img:"horacios.jpg", title:"Horacios", text:"Deber y honor."},
{img:"venus.jpg", title:"Venus", text:"Belleza clásica."},
{img:"victoria.jpg", title:"Victoria", text:"Diosa Nike."},
{img:"hammurabi.jpg", title:"Hammurabi", text:"Leyes antiguas."},
{img:"escriba.jpg", title:"Escriba", text:"Arte egipcio."},
{img:"psique.jpg", title:"Psique", text:"Amor clásico."}
];

const paintings = [];
const info = document.getElementById("info");

data.forEach((p,i)=>{

const tex = loader.load(p.img);

const mesh = new THREE.Mesh(
new THREE.PlaneGeometry(2,1.5),
new THREE.MeshBasicMaterial({map:tex})
);

mesh.position.set(i*2.5 - 10, 1.5, -5);
scene.add(mesh);

paintings.push({mesh,data:p});
});

// Movimiento
document.addEventListener("keydown",(e)=>{
if(e.key==="w") camera.position.z -=0.3;
if(e.key==="s") camera.position.z +=0.3;
if(e.key==="a") camera.position.x -=0.3;
if(e.key==="d") camera.position.x +=0.3;
});

// Info
function check(){
let show=false;

paintings.forEach(p=>{
if(camera.position.distanceTo(p.mesh.position)<2){
info.style.display="block";
info.innerHTML="<b>"+p.data.title+"</b><br>"+p.data.text;
show=true;
}
});

if(!show) info.style.display="none";
}

function animate(){
requestAnimationFrame(animate);
check();
renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
